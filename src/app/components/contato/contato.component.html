<div class="contato">
    <div class="card">
        <h2>Formulário de Contato</h2>

        <div *ngIf="enviado" class="mensagem-sucesso">
            ✅ Mensagem enviada com sucesso!
        </div>

        <form (ngSubmit)="enviarFormulario()" class="formulario">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" [(ngModel)]="form.nome" name="nome" placeholder="Seu nome" required />
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" [(ngModel)]="form.email" name="email" placeholder="seu@email.com"
                    required />
            </div>

            <div class="form-group">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" [(ngModel)]="form.mensagem" name="mensagem" placeholder="Sua mensagem aqui..."
                    rows="5" required></textarea>
            </div>

            <button type="submit">Enviar Mensagem</button>
            <button type="button" (click)="resetarFormulario()">Limpar</button>
        </form>
    </div>

    <div class="card">
        <h3>Informações de Contato:</h3>
        <p>📧 Email: contato&#64;deskapp.com</p>
        <p>📱 Telefone: (11) 99999-9999</p>
        <p>📍 Localização: São Paulo, Brasil</p>
    </div>
</div>
