<section class="login-page">
  <div class="login-panel">
    <div class="login-header">
      <img class="brand-icon" src="assets/images/icon.png" alt="NewMoney" />
      <div>
        <h1>{{ title }}</h1>
        <p>Acesse sua conta.</p>
      </div>
    </div>

    <form (ngSubmit)="submit()" class="login-form">
      <div class="field-group" *ngIf="isRegistering">
        <label for="displayName">Nome</label>
        <input id="displayName" name="displayName" type="text" [(ngModel)]="displayName" autocomplete="name" />
      </div>

      <div class="field-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" [(ngModel)]="email" autocomplete="email" required />
      </div>

      <div class="field-group">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" [(ngModel)]="password" autocomplete="current-password"
          required minlength="6" />
      </div>

      <p *ngIf="errorMessage" class="auth-error">{{ errorMessage }}</p>

      <button type="submit" [disabled]="loading">{{ loading ? 'Aguarde...' : title }}</button>
      <button type="button" class="secondary" (click)="loginWithGoogle()" [disabled]="loading">
        Entrar com Google
      </button>
    </form>

    <button type="button" class="link-button" (click)="toggleMode()" [disabled]="loading">
      {{ isRegistering ? 'Já tenho conta' : 'Criar uma nova conta' }}
    </button>
  </div>
</section>
