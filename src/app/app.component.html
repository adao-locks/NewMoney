<div class="app-shell">
  <nav *ngIf="auth.user$ | async as user">
    <div class="navbar">
      <a class="brand" routerLink="/">
        <img class="brand-icon" src="assets/images/icon.png" alt="NewMoney" />
        <span>NewMoney</span>
      </a>
      <div class="nav-links">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
        <a routerLink="/transacoes" routerLinkActive="active">Transações</a>
        <a routerLink="/sobre" routerLinkActive="active">Sobre</a>
        <a routerLink="/contato" routerLinkActive="active">Contato</a>
      </div>
      <div class="user-menu">
        <span>{{ user.displayName || user.email }}</span>
        <button type="button" class="secondary nav-logout" (click)="logout()">Sair</button>
      </div>
    </div>
  </nav>

  <main class="container">
    <router-outlet></router-outlet>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 NewMoney. Todos os direitos reservados.</p>
    </div>
  </footer>
</div>
